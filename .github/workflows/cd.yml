name: CD Workflow

on:
    push:
        branches: 
            - main
jobs:
    cd:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout repository
              uses: actions/checkout@v6

            - name: Use SSH key
              run: |
                mkdir -p ~/.ssh
                echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
                sudo chmod 600 ~/.ssh/id_rsa
            
            - name: Git config
              run: |
                git config --global user.email "dquesadaarroyo@gmail.com"
                git config --global user.name "dquesadaarroyo"

            - name: Install dependencies
              run: npm ci

            - name: Build
              run: npm run build

            - name: Deploy
              run: npm run deploy -- -r git@github.com:DanielQuesadaArroyo/Lemoncode_Modulo_8_Cloud_Automatico.git
        